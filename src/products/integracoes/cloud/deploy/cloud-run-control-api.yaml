apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: integrations-control-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
    spec:
      serviceAccountName: integrations-control-api@creatto-463117.iam.gserviceaccount.com
      containers:
        - image: southamerica-east1-docker.pkg.dev/creatto-463117/integrations/control-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: GCP_PROJECT_ID
              value: creatto-463117
            - name: GCP_REGION
              value: southamerica-east1
            - name: PUBSUB_SYNC_TOPIC
              value: integrations-sync-requests
            - name: PUBSUB_DEAD_LETTER_TOPIC
              value: integrations-sync-dead-letter
            - name: SECRET_INTERNAL_API_KEY
              value: integrations-internal-api-key
            - name: SECRET_PREFIX
              value: integrations
            - name: INTEGRATIONS_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: integrations-internal-api-key
                  key: latest
            - name: SUPABASE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-db-url
                  key: latest
            - name: INTEGRATIONS_OAUTH_STATE_SECRET
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-state-secret
                  key: latest
            - name: INTEGRATIONS_OAUTH_REDIRECT_URI
              value: https://integrations-control-api-lth6cvwldq-rj.a.run.app/callbacks/provider
            - name: INTEGRATIONS_OAUTH_CONTA_AZUL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-conta-azul-client-id
                  key: latest
            - name: INTEGRATIONS_OAUTH_CONTA_AZUL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-conta-azul-client-secret
                  key: latest
            - name: INTEGRATIONS_OAUTH_CONTA_AZUL_AUTHORIZE_URL
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-conta-azul-authorize-url
                  key: latest
            - name: INTEGRATIONS_OAUTH_CONTA_AZUL_TOKEN_URL
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-conta-azul-token-url
                  key: latest
            - name: INTEGRATIONS_OAUTH_CONTA_AZUL_SCOPES
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-conta-azul-scopes
                  key: latest
            - name: INTEGRATIONS_OAUTH_BLING_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-bling-client-id
                  key: latest
            - name: INTEGRATIONS_OAUTH_BLING_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-bling-client-secret
                  key: latest
            - name: INTEGRATIONS_OAUTH_BLING_AUTHORIZE_URL
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-bling-authorize-url
                  key: latest
            - name: INTEGRATIONS_OAUTH_BLING_TOKEN_URL
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-bling-token-url
                  key: latest
            - name: INTEGRATIONS_OAUTH_BLING_SCOPES
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-bling-scopes
                  key: latest
            - name: INTEGRATIONS_OAUTH_TINY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-tiny-client-id
                  key: latest
            - name: INTEGRATIONS_OAUTH_TINY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-tiny-client-secret
                  key: latest
            - name: INTEGRATIONS_OAUTH_TINY_AUTHORIZE_URL
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-tiny-authorize-url
                  key: latest
            - name: INTEGRATIONS_OAUTH_TINY_TOKEN_URL
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-tiny-token-url
                  key: latest
            - name: INTEGRATIONS_OAUTH_TINY_SCOPES
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-tiny-scopes
                  key: latest
            - name: INTEGRATIONS_OAUTH_LINX_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-linx-client-id
                  key: latest
            - name: INTEGRATIONS_OAUTH_LINX_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-linx-client-secret
                  key: latest
            - name: INTEGRATIONS_OAUTH_LINX_AUTHORIZE_URL
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-linx-authorize-url
                  key: latest
            - name: INTEGRATIONS_OAUTH_LINX_TOKEN_URL
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-linx-token-url
                  key: latest
            - name: INTEGRATIONS_OAUTH_LINX_SCOPES
              valueFrom:
                secretKeyRef:
                  name: integrations-oauth-linx-scopes
                  key: latest
