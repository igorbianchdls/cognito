apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: integrations-control-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
    spec:
      serviceAccountName: integrations-control-api@creatto-463117.iam.gserviceaccount.com
      containers:
        - image: southamerica-east1-docker.pkg.dev/creatto-463117/integrations/control-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: GCP_PROJECT_ID
              value: creatto-463117
            - name: GCP_REGION
              value: southamerica-east1
            - name: INTEGRATIONS_CONTROL_API_URL
              value: https://integrations-control-api-305346154546.southamerica-east1.run.app
            - name: INTEGRATIONS_SCHEDULER_OIDC_AUDIENCE
              value: https://integrations-control-api-305346154546.southamerica-east1.run.app/scheduled-sync
            - name: INTEGRATIONS_ALLOWED_OIDC_EMAILS
              value: integrations-scheduler-invoker@creatto-463117.iam.gserviceaccount.com
            - name: PUBSUB_SYNC_TOPIC
              value: integrations-sync-requests
            - name: PUBSUB_DEAD_LETTER_TOPIC
              value: integrations-sync-dead-letter
            - name: SECRET_INTERNAL_API_KEY
              value: integrations-internal-api-key
            - name: SECRET_PREFIX
              value: integrations
            - name: INTEGRATIONS_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: integrations-internal-api-key
                  key: latest
            - name: SUPABASE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-db-url
                  key: latest
            - name: INTEGRATIONS_OAUTH_REDIRECT_URI
              value: https://integrations-control-api-305346154546.southamerica-east1.run.app/callbacks/provider
            - name: INTEGRATIONS_APP_CALLBACK_URL
              value: https://cognito-305346154546.southamerica-east1.run.app/integracoes/callback
