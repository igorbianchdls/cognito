<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cognito Dashboards</title>
    <style>
:root {
  color-scheme: light;
  --cognito-bg: #ffffff;
  --cognito-border: #dfe4df;
  --cognito-border-soft: #edf0ed;
  --cognito-green: #225f42;
  --cognito-green-strong: #1b5138;
  --cognito-muted: #5f6963;
  --cognito-text: #141816;
  --cognito-surface: #ffffff;
  --cognito-surface-muted: #fafbf9;
  --cognito-shadow: 0 8px 20px rgba(20, 24, 22, 0.06);
  background: var(--cognito-bg);
  color: var(--cognito-text);
  font-family: Geist, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  letter-spacing: -0.02em;
}

* {
  box-sizing: border-box;
}

html,
body,
#root {
  min-height: 100%;
}

body {
  margin: 0;
  background: var(--cognito-bg);
}

a {
  color: inherit;
}

.app-shell {
  display: grid;
  gap: 12px;
  width: 100%;
  max-width: 820px;
  margin: 0 auto;
  padding: 18px 14px;
}

.dashboard-header,
.result-shell__header {
  display: grid;
  gap: 4px;
}

.tool-call-card {
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 76px;
  padding: 16px 20px;
  border: 1px solid #e4e4e4;
  border-radius: 20px;
  background: transparent;
  color: #181818;
}

.tool-call-card__icon {
  display: inline-flex;
  width: 40px;
  height: 40px;
  flex: 0 0 40px;
  align-items: center;
  justify-content: center;
  border: 1px solid #dddddd;
  border-radius: 16px;
  color: #181818;
}

.tool-call-card__body {
  display: grid;
  gap: 4px;
  min-width: 0;
}

.tool-call-card__main {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.tool-call-card__name {
  color: #181818;
  font-size: 18px;
  font-weight: 650;
  letter-spacing: 0;
  line-height: 1.12;
  overflow-wrap: anywhere;
}

.tool-call-card__label {
  color: #6a6a6a;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0;
  line-height: 1.3;
}

.tool-call-card__status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  min-height: 24px;
  padding: 3px 8px;
  border: 1px solid #e6e6e6;
  border-radius: 999px;
  color: #6a6a6a;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0;
  line-height: 1;
  white-space: nowrap;
}

.tool-call-card__status--done {
  border-color: #d9eadf;
  background: #f5fbf7;
  color: #225f42;
}

.tool-call-card__chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding-top: 4px;
}

.tool-call-card__chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  min-height: 24px;
  max-width: 100%;
  padding: 4px 8px;
  border: 1px solid #ececec;
  border-radius: 999px;
  color: #181818;
  font-size: 12px;
  font-weight: 550;
  letter-spacing: 0;
  line-height: 1.15;
  overflow-wrap: anywhere;
}

.tool-call-card__chip span {
  color: #6a6a6a;
  font-weight: 500;
}

.result-shell__heading {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.result-shell__copy {
  display: grid;
  gap: 4px;
  min-width: 0;
}

.result-shell__icon {
  display: inline-flex;
  width: 34px;
  height: 34px;
  flex: 0 0 34px;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--cognito-border);
  border-radius: 8px;
  background: var(--cognito-surface);
  color: #4f5a53;
  box-shadow: 0 4px 12px rgba(20, 24, 22, 0.05);
}

.result-shell__icon svg {
  width: 20px;
  height: 20px;
}

.result-shell__brand-icon {
  display: block;
  width: 22px;
  height: 22px;
  border-radius: 6px;
  object-fit: cover;
}

.result-shell__icon--erp {
  border-color: #bfdbfe;
  background: #eff6ff;
  color: #1d4ed8;
}

.result-shell__icon--crm {
  border-color: #fed7aa;
  background: #fff7ed;
  color: #ff5c35;
}

.result-shell__icon--ecommerce {
  border-color: #ddd6fe;
  background: #f5f3ff;
  color: #6d28d9;
}

.result-shell__icon--marketing {
  border-color: #fed7aa;
  background: #fff7ed;
  color: #c2410c;
}

.result-shell__icon--finance {
  border-color: #bbf7d0;
  background: #ecfdf5;
  color: #047857;
}

.result-shell__icon--sql {
  border-color: #cbd5e1;
  background: #f8fafc;
  color: #334155;
}

.result-shell__icon--neutral {
  border-color: #d7ddd8;
  background: #fafbf9;
  color: #4f5a53;
}

.dashboard-header__eyebrow,
.result-shell__eyebrow {
  margin: 0;
  color: #4f5a53;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: -0.02em;
  text-transform: uppercase;
}

.dashboard-header h1,
.result-shell__header h1 {
  margin: 0;
  color: #111513;
  font-size: 24px;
  font-weight: 760;
  letter-spacing: -0.02em;
  line-height: 1.12;
}

.dashboard-header p,
.result-shell__header p,
.state-card p {
  margin: 0;
  color: var(--cognito-muted);
  font-size: 13px;
  line-height: 1.45;
}

.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}

.dashboard-card,
.state-card,
.dashboard-meta,
.dashboard-preview-frame,
.result-card {
  border: 1px solid var(--cognito-border);
  border-radius: 8px;
  background: var(--cognito-surface);
  box-shadow: var(--cognito-shadow);
}

.dashboard-card {
  display: grid;
  gap: 10px;
  grid-template-rows: auto 1fr;
  min-height: 274px;
  padding: 12px;
}

.dashboard-card__thumbnail {
  aspect-ratio: 1.82 / 1;
  overflow: hidden;
  border: 1px solid #e1e7e2;
  border-radius: 7px;
  background: #f5f7f5;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.65);
}

.dashboard-card__thumbnail img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
}

.dashboard-card__thumbnail--empty {
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at top right, rgba(34, 95, 66, 0.12), transparent 46%),
    linear-gradient(135deg, #f8faf8 0%, #edf3ee 100%);
}

.dashboard-card__thumbnail--empty span {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border-radius: 999px;
  background: var(--cognito-green);
  color: #ffffff;
  font-size: 13px;
  font-weight: 800;
  box-shadow: 0 10px 22px rgba(34, 95, 66, 0.22);
}

.dashboard-card__body {
  display: grid;
  gap: 10px;
  grid-template-rows: 1fr auto;
  min-width: 0;
}

.dashboard-card__content {
  display: grid;
  align-content: start;
  gap: 8px;
  min-width: 0;
}

.dashboard-card__topline,
.dashboard-card__footer,
.dashboard-preview-frame__bar,
.result-card__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  color: #6b746e;
  font-size: 12px;
}

.dashboard-card__topline {
  gap: 8px;
}

.dashboard-card__status {
  color: #5f6963;
  font-size: 12px;
  font-weight: 500;
  line-height: 1;
}

.dashboard-card__version {
  color: #52605a;
  font-size: 12px;
  font-weight: 500;
}

.dashboard-card h2 {
  margin: 0;
  color: #0f1512;
  font-size: 16px;
  font-weight: 760;
  letter-spacing: -0.02em;
  line-height: 1.22;
}

.state-card h2 {
  margin: 0;
  color: #141816;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.25;
}

.dashboard-card__updated {
  display: flex;
  align-items: center;
  margin: 0;
  max-width: 130px;
  color: #5f6963;
  font-size: 12px;
  line-height: 1.3;
  overflow-wrap: anywhere;
}

.dashboard-card__open {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--cognito-green);
  border-radius: 6px;
  background: var(--cognito-green);
  color: #ffffff;
  font-size: 13px;
  font-weight: 800;
  line-height: 1;
  min-width: 52px;
  min-height: 28px;
  padding: 7px 11px;
  text-decoration: none;
  white-space: nowrap;
  box-shadow: none;
}

.dashboard-card__open:hover {
  background: var(--cognito-green-strong);
  border-color: var(--cognito-green-strong);
}

.dashboard-embed-frame .dashboard-preview-frame__bar a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--cognito-green);
  border-radius: 6px;
  background: var(--cognito-green);
  color: #ffffff;
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
  padding: 7px 10px;
  text-decoration: none;
  white-space: nowrap;
}

.state-card {
  display: grid;
  gap: 6px;
  min-height: 104px;
  align-content: center;
  padding: 16px;
}

.state-card--error {
  border-color: #f0b4a8;
  background: #fff7f5;
}

.dashboard-preview-layout {
  display: grid;
  gap: 12px;
}

.dashboard-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 0;
  margin: 0;
  overflow: hidden;
  padding: 0;
}

.dashboard-meta div {
  display: grid;
  gap: 4px;
  min-width: 0;
  border-right: 1px solid var(--cognito-border-soft);
  border-bottom: 1px solid var(--cognito-border-soft);
  padding: 10px 12px;
}

.dashboard-meta dt {
  color: #68726c;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: -0.02em;
  text-transform: uppercase;
}

.dashboard-meta dd {
  margin: 0;
  color: #222724;
  font-size: 12px;
  line-height: 1.35;
  overflow-wrap: anywhere;
}

.dashboard-preview-frame {
  overflow: hidden;
}

.dashboard-preview-frame__bar,
.result-card__header {
  min-height: 42px;
  border-bottom: 1px solid var(--cognito-border-soft);
  background: var(--cognito-surface-muted);
  padding: 9px 12px;
  font-weight: 750;
}

.dashboard-preview-frame pre {
  margin: 0;
  max-height: 430px;
  overflow: auto;
  padding: 12px;
  color: #252b27;
  background: #ffffff;
  font-size: 12px;
  line-height: 1.55;
  white-space: pre-wrap;
}

.dashboard-embed-frame iframe {
  display: block;
  width: 100%;
  min-height: min(68vh, 620px);
  border: 0;
  background: var(--cognito-surface);
}

.dashboard-embed-frame .dashboard-preview-frame__bar a:hover {
  background: var(--cognito-green-strong);
  border-color: var(--cognito-green-strong);
}

.result-card {
  overflow: hidden;
}

.table-card {
  display: grid;
  gap: 12px;
  background: #ffffff;
  padding: 0;
}

.table-card__header {
  margin-bottom: 0;
}

.table-card--data-result {
  gap: 0;
}

.table-scroll {
  max-height: 500px;
  overflow: auto;
  background: #ffffff;
}

.table-pagination {
  display: flex;
  min-height: 44px;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-top: 1px solid var(--cognito-border-soft);
  background: var(--cognito-surface-muted);
  padding: 8px 12px;
}

.table-pagination__size,
.table-pagination__controls {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: #68726c;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: -0.02em;
  white-space: nowrap;
}

.table-pagination__size select {
  height: 28px;
  min-width: 64px;
  border: 1px solid var(--cognito-border);
  border-radius: 7px;
  background: #ffffff;
  color: #222724;
  font: inherit;
  padding: 0 8px;
}

.table-pagination__controls button {
  display: inline-flex;
  width: 28px;
  height: 28px;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--cognito-border);
  border-radius: 7px;
  background: #ffffff;
  color: #314039;
  cursor: pointer;
}

.table-pagination__controls button:hover:not(:disabled) {
  border-color: #bfc9c2;
  background: #f9fbfa;
}

.table-pagination__controls button:disabled {
  color: #a5aea8;
  cursor: not-allowed;
  opacity: 0.64;
}

.data-table {
  width: 100%;
  min-width: 720px;
  border-collapse: collapse;
  font-size: 12px;
}

.data-table th,
.data-table td {
  border-bottom: 1px solid var(--cognito-border-soft);
  padding: 8px 12px;
  text-align: left;
  vertical-align: middle;
}

.data-table th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: #ffffff;
  color: #606a64;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  white-space: nowrap;
}

.data-table td {
  max-width: 260px;
  color: #29302b;
  line-height: 1.35;
}

.data-table tbody tr:hover {
  background: #fafcfb;
}

.data-table td:first-child {
  color: #141816;
  font-weight: 650;
}

.data-table__cell--money,
.data-table__cell--number {
  text-align: right;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.data-table__cell--date {
  white-space: nowrap;
}

.data-table__cell--text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.financial-statement-card .table-scroll {
  max-height: none;
}

.data-table--financial {
  min-width: 620px;
}

.data-table--financial th:last-child,
.data-table--financial td:last-child {
  text-align: right;
}

.data-table--financial td {
  max-width: none;
}

.data-table--financial td:first-child {
  font-weight: 650;
}

.data-table--financial tbody tr:hover {
  background: #fafcfb;
}

.data-table--financial .financial-row--normal td {
  background: #ffffff;
}

.data-table--financial .financial-row--child td {
  background: #ffffff;
}

.data-table--financial .financial-row--child td:first-child {
  padding-left: 34px;
}

.data-table--financial .financial-row--subtotal td {
  background: #eef1ee;
  color: #141816;
  font-weight: 750;
}

.data-table--financial .financial-row--subtotal {
  cursor: pointer;
}

.financial-row__toggle {
  display: inline-flex;
  max-width: 100%;
  align-items: center;
  gap: 7px;
  border: 0;
  background: transparent;
  color: inherit;
  cursor: pointer;
  font: inherit;
  font-weight: inherit;
  letter-spacing: inherit;
  padding: 0;
  text-align: left;
}

.financial-row__toggle svg {
  flex: 0 0 auto;
  color: #4f5a53;
}

.financial-row__toggle span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.status-badge {
  display: inline-flex;
  max-width: 160px;
  align-items: center;
  border: 1px solid #d7ddd8;
  border-radius: 999px;
  color: #4f5a53;
  font-size: 11px;
  font-weight: 750;
  line-height: 1;
  padding: 5px 8px;
  text-transform: capitalize;
  white-space: nowrap;
}

.status-badge--success {
  border-color: #b9dfc7;
  background: #edf8f0;
  color: #17623a;
}

.status-badge--warning {
  border-color: #edd08a;
  background: #fff7dd;
  color: #805a12;
}

.status-badge--danger {
  border-color: #efb2ac;
  background: #fff1ef;
  color: #9b2b23;
}

.chart-card {
  display: grid;
  gap: 12px;
  overflow: hidden;
  background: #ffffff;
  padding: 0;
}

.chart-card__header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
  min-width: 0;
  border-bottom: 1px solid var(--cognito-border-soft);
  margin-bottom: 10px;
  padding-bottom: 12px;
}

.chart-card__copy {
  display: grid;
  gap: 5px;
  min-width: 0;
}

.chart-card__copy h1 {
  margin: 0;
  color: #111513;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.22;
}

.chart-card__copy p {
  margin: 0;
  color: #68726c;
  font-size: 12px;
  letter-spacing: -0.02em;
  line-height: 1.35;
}

.chart-card__total {
  flex: 0 0 auto;
  color: #111513;
  font-size: 15px;
  font-variant-numeric: tabular-nums;
  font-weight: 760;
  letter-spacing: 0;
  line-height: 1.2;
  text-align: right;
  white-space: nowrap;
}

.chart-card__body {
  display: grid;
  grid-template-columns: minmax(150px, 0.82fr) minmax(220px, 1.18fr);
  gap: 18px;
  align-items: center;
}

.chart-card__body--chart-only {
  grid-template-columns: minmax(0, 1fr);
}

.chart-card__body--bars-only {
  grid-template-columns: minmax(0, 1fr);
}

.chart-card__donut {
  width: 100%;
  min-width: 0;
  height: 320px;
}

.chart-card__plot {
  width: 100%;
  min-width: 0;
  height: 320px;
}

.chart-breakdown {
  display: grid;
  gap: 11px;
  min-width: 0;
}

.chart-breakdown__row {
  display: grid;
  grid-template-columns: minmax(78px, 0.72fr) minmax(96px, 1fr) minmax(68px, auto);
  gap: 10px;
  align-items: center;
  min-width: 0;
}

.chart-breakdown__label {
  min-width: 0;
  overflow: hidden;
  color: #222724;
  font-size: 12px;
  font-weight: 650;
  letter-spacing: 0;
  line-height: 1.25;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chart-breakdown__track {
  display: block;
  width: 100%;
  height: 3px;
  overflow: hidden;
  border-radius: 999px;
  background: #e8ede9;
}

.chart-breakdown__fill {
  display: block;
  height: 100%;
  min-width: 2px;
  border-radius: inherit;
}

.chart-breakdown__value {
  color: #202622;
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  font-weight: 650;
  letter-spacing: 0;
  line-height: 1.2;
  text-align: right;
  white-space: nowrap;
}

.catalog-panel {
  display: grid;
  gap: 12px;
}

.catalog-kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
  gap: 8px;
}

.catalog-kpi,
.catalog-source,
.catalog-notes section,
.catalog-empty {
  border: 1px solid var(--cognito-border);
  border-radius: 8px;
  background: #ffffff;
  box-shadow: var(--cognito-shadow);
}

.catalog-kpi {
  display: grid;
  gap: 5px;
  padding: 11px 12px;
}

.catalog-kpi span,
.catalog-source__label {
  color: #68726c;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

.catalog-kpi strong,
.catalog-source strong {
  color: #111513;
  font-size: 16px;
  font-variant-numeric: tabular-nums;
  font-weight: 780;
  letter-spacing: 0;
  line-height: 1.15;
}

.catalog-source-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(152px, 1fr));
  gap: 8px;
}

.catalog-source {
  display: grid;
  gap: 8px;
  padding: 10px 12px;
}

.catalog-source > div {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  min-width: 0;
}

.catalog-status {
  display: inline-flex;
  align-items: center;
  border: 1px solid #d7ddd8;
  border-radius: 999px;
  color: #4f5a53;
  font-size: 10px;
  font-weight: 800;
  line-height: 1;
  padding: 4px 7px;
  text-transform: capitalize;
  white-space: nowrap;
}

.catalog-status--success {
  border-color: #b9dfc7;
  background: #edf8f0;
  color: #17623a;
}

.catalog-status--warning {
  border-color: #edd08a;
  background: #fff7dd;
  color: #805a12;
}

.catalog-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  align-items: center;
}

.catalog-tab {
  display: inline-flex;
  min-height: 32px;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--cognito-border);
  border-radius: 7px;
  background: #ffffff;
  color: #334039;
  cursor: pointer;
  font: inherit;
  font-size: 12px;
  font-weight: 760;
  letter-spacing: 0;
  padding: 7px 10px;
}

.catalog-tab:hover {
  border-color: #bfc9c2;
  background: #f9fbfa;
}

.catalog-tab[aria-selected='true'] {
  border-color: var(--cognito-green);
  background: #eef7f1;
  color: var(--cognito-green);
}

.catalog-empty {
  min-height: 92px;
  display: grid;
  place-items: center;
  color: #68726c;
  font-size: 13px;
  font-weight: 650;
  padding: 16px;
}

.catalog-notes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 10px;
}

.catalog-notes section {
  display: grid;
  align-content: start;
  gap: 8px;
  padding: 12px;
}

.catalog-notes h2 {
  display: flex;
  align-items: center;
  gap: 7px;
  margin: 0;
  color: #111513;
  font-size: 13px;
  font-weight: 780;
  letter-spacing: 0;
  line-height: 1.2;
}

.catalog-notes ul {
  display: grid;
  gap: 6px;
  margin: 0;
  padding-left: 17px;
}

.catalog-notes li {
  color: #4f5a53;
  font-size: 12px;
  line-height: 1.35;
}

.analysis-panel,
.automation-panel {
  display: grid;
  gap: 12px;
}

.analysis-summary {
  margin: 0;
  border: 1px solid var(--cognito-border);
  border-radius: 8px;
  background: #ffffff;
  box-shadow: var(--cognito-shadow);
  color: #29302b;
  font-size: 14px;
  line-height: 1.45;
  padding: 13px 14px;
}

.analysis-metrics {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
  gap: 8px;
}

.analysis-metric,
.analysis-card,
.analysis-next,
.automation-list-summary > div,
.automation-list-card,
.automation-summary section {
  border: 1px solid var(--cognito-border);
  border-radius: 8px;
  background: #ffffff;
  box-shadow: var(--cognito-shadow);
}

.analysis-metric {
  display: grid;
  gap: 5px;
  padding: 11px 12px;
}

.analysis-metric span,
.analysis-card header p,
.automation-list-summary span,
.automation-list-card dt,
.automation-summary dt {
  color: #68726c;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

.analysis-metric strong {
  color: #111513;
  font-size: 16px;
  font-variant-numeric: tabular-nums;
  font-weight: 780;
  letter-spacing: 0;
  line-height: 1.15;
}

.analysis-sections {
  display: grid;
  gap: 10px;
}

.analysis-card {
  display: grid;
  gap: 9px;
  padding: 12px;
}

.analysis-card--critical,
.analysis-card--high {
  border-color: #efb2ac;
}

.analysis-card--medium {
  border-color: #edd08a;
}

.analysis-card header {
  display: flex;
  align-items: flex-start;
  gap: 9px;
}

.analysis-card__icon {
  display: inline-flex;
  width: 28px;
  height: 28px;
  flex: 0 0 28px;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--cognito-border);
  border-radius: 7px;
  background: #fafbf9;
  color: #4f5a53;
}

.analysis-card--critical .analysis-card__icon,
.analysis-card--high .analysis-card__icon {
  border-color: #efb2ac;
  background: #fff1ef;
  color: #9b2b23;
}

.analysis-card--medium .analysis-card__icon {
  border-color: #edd08a;
  background: #fff7dd;
  color: #805a12;
}

.analysis-card h2,
.analysis-next h2,
.automation-summary h2 {
  margin: 0;
  color: #111513;
  font-size: 14px;
  font-weight: 780;
  letter-spacing: 0;
  line-height: 1.25;
}

.analysis-card p,
.analysis-card strong,
.analysis-card__impact {
  margin: 0;
  color: #4f5a53;
  font-size: 12px;
  line-height: 1.4;
}

.analysis-card strong {
  color: #202622;
  font-weight: 730;
}

.analysis-card__impact {
  display: inline-flex;
  width: fit-content;
  border: 1px solid #d7ddd8;
  border-radius: 999px;
  background: #fafbf9;
  color: #314039;
  font-weight: 750;
  padding: 5px 8px;
}

.analysis-next {
  display: grid;
  gap: 8px;
  padding: 12px;
}

.analysis-next ol {
  display: grid;
  gap: 6px;
  margin: 0;
  padding-left: 20px;
}

.analysis-next li {
  color: #4f5a53;
  font-size: 12px;
  line-height: 1.35;
}

.automation-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 10px;
}

.automation-summary section {
  display: grid;
  align-content: start;
  gap: 10px;
  padding: 12px;
}

.automation-summary dl {
  display: grid;
  gap: 7px;
  margin: 0;
}

.automation-summary div {
  display: grid;
  gap: 3px;
  min-width: 0;
}

.automation-summary dd {
  margin: 0;
  color: #29302b;
  font-size: 12px;
  line-height: 1.35;
  overflow-wrap: anywhere;
}

.automation-list-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
  gap: 8px;
}

.automation-list-summary > div {
  display: grid;
  gap: 5px;
  padding: 11px 12px;
}

.automation-list-summary strong {
  color: #111513;
  font-size: 15px;
  font-variant-numeric: tabular-nums;
  font-weight: 780;
  letter-spacing: 0;
  line-height: 1.15;
}

.automation-list-grid {
  display: grid;
  gap: 10px;
}

.automation-list-card {
  display: grid;
  gap: 10px;
  padding: 12px;
}

.automation-list-card header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid var(--cognito-border-soft);
  margin-bottom: 10px;
  padding-bottom: 10px;
}

.automation-list-card h2 {
  margin: 0;
  color: #111513;
  font-size: 14px;
  font-weight: 780;
  letter-spacing: 0;
  line-height: 1.25;
}

.automation-list-card header p,
.automation-list-card__description {
  margin: 0;
  color: #4f5a53;
  font-size: 12px;
  line-height: 1.35;
}

.automation-list-card__description {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.automation-list-card dl {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
  gap: 8px;
  margin: 0;
}

.automation-list-card div {
  min-width: 0;
}

.automation-list-card dd {
  margin: 2px 0 0;
  color: #29302b;
  font-size: 12px;
  line-height: 1.35;
  overflow-wrap: anywhere;
}

.connectors-panel {
  display: grid;
  gap: 12px;
}

.connector-result,
.connectors-directory {
  border: 1px solid var(--cognito-border);
  border-radius: 8px;
  background: #ffffff;
}

.connector-result dt,
.connectors-directory__header,
.connectors-directory__topline,
.connectors-directory__footer p {
  color: #68726c;
  font-size: 11px;
  font-weight: 760;
  letter-spacing: 0;
}

.connectors-directory {
  border: 0;
  display: grid;
  overflow: hidden;
}

.connectors-directory__topline {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
  border-bottom: 1px solid var(--cognito-border-soft);
  background: #fbfcfb;
  padding: 11px 12px;
}

.connectors-directory__header {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 104px;
  gap: 12px;
  border-bottom: 1px solid var(--cognito-border-soft);
  padding: 10px 12px 8px;
}

.connectors-directory__header span:last-child {
  text-align: right;
}

.connectors-directory__rows {
  display: grid;
}

.connector-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 104px;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
}

.connector-row + .connector-row {
  border-top: 1px solid var(--cognito-border-soft);
}

.connector-row__identity {
  display: flex;
  align-items: center;
  gap: 9px;
  min-width: 0;
}

.connector-row__mark {
  display: inline-flex;
  width: 25px;
  height: 25px;
  flex: 0 0 25px;
  align-items: center;
  justify-content: center;
  border: 0;
  border-radius: 6px;
  background: #f7faf8;
  color: #225f42;
  overflow: hidden;
}

.connector-row__logo {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: contain;
}

.connector-row__fallback {
  font-size: 11px;
  font-weight: 820;
}

.connector-row__copy {
  display: grid;
  gap: 2px;
  min-width: 0;
}

.connector-row__copy h2,
.connector-result h2 {
  margin: 0;
  color: #2a312d;
  font-size: 15px;
  font-weight: 760;
  letter-spacing: -0.02em;
  line-height: 1.25;
}

.connector-row__copy p,
.connector-row__error {
  margin: 0;
  color: #4f5a53;
  font-size: 11px;
  letter-spacing: -0.02em;
  line-height: 1.35;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.connector-row__error {
  color: #9b2b23;
}

.connector-row__status {
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  gap: 7px;
  min-width: 0;
  color: #38413c;
  font-size: 12px;
  font-weight: 640;
}

.connector-row__status span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.connector-row__status i {
  width: 7px;
  height: 7px;
  flex: 0 0 7px;
  border-radius: 999px;
  background: #9aa39d;
}

.connector-row__status--success i {
  background: #20b15a;
}

.connector-row__status--warning i {
  background: #d99a22;
}

.connector-row__status--danger i {
  background: #d94a3a;
}

.connectors-directory__footer {
  display: grid;
  gap: 10px;
  border-top: 1px solid var(--cognito-border-soft);
  padding: 12px;
}

.connectors-directory__footer p {
  margin: 0;
  text-align: center;
}

.connectors-directory__footer button {
  width: 100%;
  min-height: 38px;
  border: 0;
  border-radius: 999px;
  background: #0f1110;
  color: #ffffff;
  cursor: default;
  font: inherit;
  font-size: 12px;
  font-weight: 780;
  letter-spacing: 0;
}

.connector-result dl {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
  gap: 8px;
  margin: 0;
}

.connector-result dd {
  margin: 2px 0 0;
  color: #29302b;
  font-size: 12px;
  line-height: 1.35;
  overflow-wrap: anywhere;
}

.connector-result {
  display: grid;
  gap: 10px;
  padding: 12px;
}

@media (max-width: 640px) {
  .app-shell {
    padding: 10px;
  }

  .tool-call-card {
    align-items: flex-start;
    gap: 8px;
    padding: 12px;
  }

  .tool-call-card__icon {
    width: 36px;
    height: 36px;
    flex-basis: 36px;
    border-radius: 14px;
  }

  .tool-call-card__name {
    font-size: 16px;
  }

  .dashboard-header h1,
  .result-shell__header h1 {
    font-size: 21px;
  }

  .dashboard-card {
    min-height: 0;
  }

  .dashboard-meta {
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  }

  .data-table {
    min-width: 680px;
  }

  .table-pagination {
    align-items: stretch;
    flex-direction: column;
  }

  .table-pagination__size,
  .table-pagination__controls {
    justify-content: space-between;
    width: 100%;
  }

  .chart-card {
    padding: 0;
  }

  .table-card {
    padding: 0;
  }

  .chart-card__header {
    align-items: flex-start;
    flex-direction: column;
    gap: 8px;
  }

  .chart-card__total {
    text-align: left;
  }

  .chart-card__body {
    grid-template-columns: minmax(0, 1fr);
    gap: 12px;
  }

  .chart-card__plot {
    height: 220px;
  }

  .chart-card__donut {
    height: 190px;
  }

  .chart-breakdown__row {
    grid-template-columns: minmax(78px, 0.78fr) minmax(88px, 1fr) minmax(62px, auto);
    gap: 8px;
  }

  .catalog-kpis,
  .catalog-source-strip,
  .catalog-notes,
  .analysis-metrics,
  .automation-list-summary,
  .automation-summary {
    grid-template-columns: minmax(0, 1fr);
  }

  .automation-list-card__description {
    white-space: normal;
  }
}
