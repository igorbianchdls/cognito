<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cognito Dashboards</title>
    <style>
:root {
  color-scheme: light;
  background: #f5f6f4;
  color: #141816;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html,
body,
#root {
  min-height: 100%;
}

body {
  margin: 0;
  background: #f5f6f4;
}

a {
  color: inherit;
}

.app-shell {
  display: grid;
  gap: 12px;
  padding: 12px;
}

.dashboard-header,
.result-shell__header {
  display: grid;
  gap: 4px;
}

.dashboard-header__eyebrow,
.result-shell__eyebrow {
  margin: 0;
  color: #1f7a4f;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

.dashboard-header h1,
.result-shell__header h1 {
  margin: 0;
  color: #111513;
  font-size: 24px;
  font-weight: 750;
  letter-spacing: 0;
  line-height: 1.12;
}

.dashboard-header p,
.result-shell__header p,
.state-card p {
  margin: 0;
  color: #5f6963;
  font-size: 13px;
  line-height: 1.45;
}

.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}

.dashboard-card,
.state-card,
.dashboard-meta,
.dashboard-preview-frame,
.metric-card,
.result-card {
  border: 1px solid #dfe4df;
  border-radius: 8px;
  background: #ffffff;
  box-shadow: 0 8px 20px rgba(20, 24, 22, 0.06);
}

.dashboard-card {
  display: grid;
  gap: 10px;
  padding: 12px;
}

.dashboard-card__topline,
.dashboard-card__footer,
.dashboard-preview-frame__bar,
.result-card__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  color: #6b746e;
  font-size: 12px;
}

.dashboard-card h2,
.state-card h2 {
  margin: 0;
  color: #141816;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0;
  line-height: 1.25;
}

.dashboard-card p {
  margin: 0;
  color: #68726c;
  font-size: 13px;
  line-height: 1.4;
  overflow-wrap: anywhere;
}

.dashboard-card a,
.dashboard-embed-frame .dashboard-preview-frame__bar a {
  border: 1px solid #225f42;
  border-radius: 6px;
  background: #225f42;
  color: #ffffff;
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
  padding: 7px 10px;
  text-decoration: none;
  white-space: nowrap;
}

.state-card {
  display: grid;
  gap: 4px;
  padding: 14px;
}

.state-card--error {
  border-color: #f0b4a8;
  background: #fff7f5;
}

.dashboard-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  margin: 0;
  padding: 12px;
}

.dashboard-meta div {
  display: grid;
  gap: 3px;
  min-width: 0;
}

.dashboard-meta dt {
  color: #68726c;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

.dashboard-meta dd {
  margin: 0;
  color: #222724;
  font-size: 13px;
  overflow-wrap: anywhere;
}

.dashboard-preview-frame {
  overflow: hidden;
}

.dashboard-preview-frame__bar,
.result-card__header {
  border-bottom: 1px solid #e6eae6;
  padding: 10px 12px;
}

.dashboard-preview-frame pre {
  margin: 0;
  max-height: 420px;
  overflow: auto;
  padding: 12px;
  color: #252b27;
  font-size: 12px;
  line-height: 1.55;
  white-space: pre-wrap;
}

.dashboard-embed-frame iframe {
  display: block;
  width: 100%;
  min-height: min(74vh, 820px);
  border: 0;
  background: #ffffff;
}

.metric-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
}

.metric-card {
  display: grid;
  gap: 5px;
  min-width: 0;
  padding: 12px;
}

.metric-card span {
  color: #68726c;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

.metric-card strong {
  color: #111513;
  font-size: 21px;
  font-weight: 760;
  letter-spacing: 0;
  line-height: 1.1;
}

.result-card {
  overflow: hidden;
}

.result-card__header h2 {
  margin: 0;
  color: #141816;
  font-size: 14px;
  font-weight: 750;
  letter-spacing: 0;
}

.result-card__header span {
  color: #68726c;
  font-size: 12px;
  white-space: nowrap;
}

.table-scroll {
  max-height: 520px;
  overflow: auto;
}

.data-table {
  width: 100%;
  min-width: 760px;
  border-collapse: collapse;
  font-size: 12px;
}

.data-table th,
.data-table td {
  border-bottom: 1px solid #edf0ed;
  padding: 9px 12px;
  text-align: left;
  vertical-align: middle;
}

.data-table th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: #fafbf9;
  color: #606a64;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
  white-space: nowrap;
}

.data-table td {
  max-width: 260px;
  color: #29302b;
  line-height: 1.35;
}

.data-table__cell--money,
.data-table__cell--number {
  text-align: right;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.data-table__cell--date {
  white-space: nowrap;
}

.data-table__cell--text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.status-badge {
  display: inline-flex;
  max-width: 160px;
  align-items: center;
  border: 1px solid #d7ddd8;
  border-radius: 999px;
  color: #4f5a53;
  font-size: 11px;
  font-weight: 750;
  line-height: 1;
  padding: 5px 8px;
  text-transform: capitalize;
  white-space: nowrap;
}

.status-badge--success {
  border-color: #b9dfc7;
  background: #edf8f0;
  color: #17623a;
}

.status-badge--warning {
  border-color: #edd08a;
  background: #fff7dd;
  color: #805a12;
}

.status-badge--danger {
  border-color: #efb2ac;
  background: #fff1ef;
  color: #9b2b23;
}

@media (max-width: 640px) {
  .app-shell {
    padding: 10px;
  }

  .dashboard-header h1,
  .result-shell__header h1 {
    font-size: 21px;
  }

  .metric-grid {
    grid-template-columns: 1fr;
  }

  .data-table {
    min-width: 680px;
  }
}

    </style>
  </head>
