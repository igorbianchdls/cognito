<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cognito Dashboards</title>
    <style>
:root {
  color-scheme: light;
  --cognito-bg: #ffffff;
  --cognito-border: #dfe4df;
  --cognito-border-soft: #edf0ed;
  --cognito-green: #225f42;
  --cognito-green-strong: #1b5138;
  --cognito-muted: #5f6963;
  --cognito-text: #141816;
  --cognito-surface: #ffffff;
  --cognito-surface-muted: #fafbf9;
  --cognito-shadow: 0 8px 20px rgba(20, 24, 22, 0.06);
  background: var(--cognito-bg);
  color: var(--cognito-text);
  font-family: Geist, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  letter-spacing: -0.02em;
}

* {
  box-sizing: border-box;
}

html,
body,
#root {
  min-height: 100%;
}

body {
  margin: 0;
  background: var(--cognito-bg);
}

a {
  color: inherit;
}

.app-shell {
  display: grid;
  gap: 12px;
  width: 100%;
  max-width: 820px;
  margin: 0 auto;
  padding: 18px 14px;
}

.dashboard-header,
.result-shell__header {
  display: grid;
  gap: 4px;
}

.result-shell__heading {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.result-shell__copy {
  display: grid;
  gap: 4px;
  min-width: 0;
}

.result-shell__icon {
  display: inline-flex;
  width: 34px;
  height: 34px;
  flex: 0 0 34px;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--cognito-border);
  border-radius: 8px;
  background: var(--cognito-surface);
  color: #4f5a53;
  box-shadow: 0 4px 12px rgba(20, 24, 22, 0.05);
}

.result-shell__icon svg {
  width: 20px;
  height: 20px;
}

.result-shell__brand-icon {
  display: block;
  width: 22px;
  height: 22px;
  border-radius: 6px;
  object-fit: cover;
}

.result-shell__icon--erp {
  border-color: #bfdbfe;
  background: #eff6ff;
  color: #1d4ed8;
}

.result-shell__icon--crm {
  border-color: #fed7aa;
  background: #fff7ed;
  color: #ff5c35;
}

.result-shell__icon--ecommerce {
  border-color: #ddd6fe;
  background: #f5f3ff;
  color: #6d28d9;
}

.result-shell__icon--marketing {
  border-color: #fed7aa;
  background: #fff7ed;
  color: #c2410c;
}

.result-shell__icon--sql {
  border-color: #cbd5e1;
  background: #f8fafc;
  color: #334155;
}

.result-shell__icon--neutral {
  border-color: #d7ddd8;
  background: #fafbf9;
  color: #4f5a53;
}

.dashboard-header__eyebrow,
.result-shell__eyebrow {
  margin: 0;
  color: #4f5a53;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: -0.02em;
  text-transform: uppercase;
}

.dashboard-header h1,
.result-shell__header h1 {
  margin: 0;
  color: #111513;
  font-size: 24px;
  font-weight: 760;
  letter-spacing: -0.02em;
  line-height: 1.12;
}

.dashboard-header p,
.result-shell__header p,
.state-card p {
  margin: 0;
  color: var(--cognito-muted);
  font-size: 13px;
  line-height: 1.45;
}

.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}

.dashboard-card,
.state-card,
.dashboard-meta,
.dashboard-preview-frame,
.result-card {
  border: 1px solid var(--cognito-border);
  border-radius: 8px;
  background: var(--cognito-surface);
  box-shadow: var(--cognito-shadow);
}

.dashboard-card {
  display: grid;
  gap: 10px;
  grid-template-rows: auto 1fr;
  min-height: 274px;
  padding: 12px;
}

.dashboard-card__thumbnail {
  aspect-ratio: 1.82 / 1;
  overflow: hidden;
  border: 1px solid #e1e7e2;
  border-radius: 7px;
  background: #f5f7f5;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.65);
}

.dashboard-card__thumbnail img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
}

.dashboard-card__thumbnail--empty {
  display: grid;
  place-items: center;
  background:
    radial-gradient(circle at top right, rgba(34, 95, 66, 0.12), transparent 46%),
    linear-gradient(135deg, #f8faf8 0%, #edf3ee 100%);
}

.dashboard-card__thumbnail--empty span {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border-radius: 999px;
  background: var(--cognito-green);
  color: #ffffff;
  font-size: 13px;
  font-weight: 800;
  box-shadow: 0 10px 22px rgba(34, 95, 66, 0.22);
}

.dashboard-card__body {
  display: grid;
  gap: 10px;
  grid-template-rows: 1fr auto;
  min-width: 0;
}

.dashboard-card__content {
  display: grid;
  align-content: start;
  gap: 8px;
  min-width: 0;
}

.dashboard-card__topline,
.dashboard-card__footer,
.dashboard-preview-frame__bar,
.result-card__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  color: #6b746e;
  font-size: 12px;
}

.dashboard-card__topline {
  gap: 8px;
}

.dashboard-card__status {
  color: #5f6963;
  font-size: 12px;
  font-weight: 500;
  line-height: 1;
}

.dashboard-card__version {
  color: #52605a;
  font-size: 12px;
  font-weight: 500;
}

.dashboard-card h2 {
  margin: 0;
  color: #0f1512;
  font-size: 16px;
  font-weight: 760;
  letter-spacing: -0.02em;
  line-height: 1.22;
}

.state-card h2 {
  margin: 0;
  color: #141816;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.25;
}

.dashboard-card__identifier,
.dashboard-card__updated {
  display: flex;
  align-items: center;
  margin: 0;
  color: #5f6963;
  font-size: 14px;
  line-height: 1.4;
  overflow-wrap: anywhere;
}

.dashboard-card__identifier span {
  min-width: 0;
}

.dashboard-card__updated {
  max-width: 130px;
  font-size: 12px;
  line-height: 1.3;
}

.dashboard-card__open {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--cognito-green);
  border-radius: 6px;
  background: var(--cognito-green);
  color: #ffffff;
  font-size: 13px;
  font-weight: 800;
  line-height: 1;
  min-width: 52px;
  min-height: 28px;
  padding: 7px 11px;
  text-decoration: none;
  white-space: nowrap;
  box-shadow: none;
}

.dashboard-card__open:hover {
  background: var(--cognito-green-strong);
  border-color: var(--cognito-green-strong);
}

.dashboard-embed-frame .dashboard-preview-frame__bar a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--cognito-green);
  border-radius: 6px;
  background: var(--cognito-green);
  color: #ffffff;
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
  padding: 7px 10px;
  text-decoration: none;
  white-space: nowrap;
}

.state-card {
  display: grid;
  gap: 6px;
  min-height: 104px;
  align-content: center;
  padding: 16px;
}

.state-card--error {
  border-color: #f0b4a8;
  background: #fff7f5;
}

.dashboard-preview-layout {
  display: grid;
  gap: 12px;
}

.dashboard-meta {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 0;
  margin: 0;
  overflow: hidden;
  padding: 0;
}

.dashboard-meta div {
  display: grid;
  gap: 4px;
  min-width: 0;
  border-right: 1px solid var(--cognito-border-soft);
  border-bottom: 1px solid var(--cognito-border-soft);
  padding: 10px 12px;
}

.dashboard-meta dt {
  color: #68726c;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: -0.02em;
  text-transform: uppercase;
}

.dashboard-meta dd {
  margin: 0;
  color: #222724;
  font-size: 12px;
  line-height: 1.35;
  overflow-wrap: anywhere;
}

.dashboard-preview-frame {
  overflow: hidden;
}

.dashboard-preview-frame__bar,
.result-card__header {
  min-height: 42px;
  border-bottom: 1px solid var(--cognito-border-soft);
  background: var(--cognito-surface-muted);
  padding: 9px 12px;
  font-weight: 750;
}

.dashboard-preview-frame pre {
  margin: 0;
  max-height: 430px;
  overflow: auto;
  padding: 12px;
  color: #252b27;
  background: #ffffff;
  font-size: 12px;
  line-height: 1.55;
  white-space: pre-wrap;
}

.dashboard-embed-frame iframe {
  display: block;
  width: 100%;
  min-height: min(68vh, 620px);
  border: 0;
  background: var(--cognito-surface);
}

.dashboard-embed-frame .dashboard-preview-frame__bar a:hover {
  background: var(--cognito-green-strong);
  border-color: var(--cognito-green-strong);
}

.result-card {
  overflow: hidden;
}

.table-scroll {
  max-height: 500px;
  overflow: auto;
  background: #ffffff;
}

.table-pagination {
  display: flex;
  min-height: 44px;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-top: 1px solid var(--cognito-border-soft);
  background: var(--cognito-surface-muted);
  padding: 8px 12px;
}

.table-pagination__size,
.table-pagination__controls {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: #68726c;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: -0.02em;
  white-space: nowrap;
}

.table-pagination__size select {
  height: 28px;
  min-width: 64px;
  border: 1px solid var(--cognito-border);
  border-radius: 7px;
  background: #ffffff;
  color: #222724;
  font: inherit;
  padding: 0 8px;
}

.table-pagination__controls button {
  display: inline-flex;
  width: 28px;
  height: 28px;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--cognito-border);
  border-radius: 7px;
  background: #ffffff;
  color: #314039;
  cursor: pointer;
}

.table-pagination__controls button:hover:not(:disabled) {
  border-color: #bfc9c2;
  background: #f9fbfa;
}

.table-pagination__controls button:disabled {
  color: #a5aea8;
  cursor: not-allowed;
  opacity: 0.64;
}

.data-table {
  width: 100%;
  min-width: 720px;
  border-collapse: collapse;
  font-size: 12px;
}

.data-table th,
.data-table td {
  border-bottom: 1px solid var(--cognito-border-soft);
  padding: 8px 12px;
  text-align: left;
  vertical-align: middle;
}

.data-table th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: var(--cognito-surface-muted);
  color: #606a64;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  white-space: nowrap;
}

.data-table td {
  max-width: 260px;
  color: #29302b;
  line-height: 1.35;
}

.data-table tbody tr:hover {
  background: #fafcfb;
}

.data-table td:first-child {
  color: #141816;
  font-weight: 650;
}

.data-table__cell--money,
.data-table__cell--number {
  text-align: right;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.data-table__cell--date {
  white-space: nowrap;
}

.data-table__cell--text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.status-badge {
  display: inline-flex;
  max-width: 160px;
  align-items: center;
  border: 1px solid #d7ddd8;
  border-radius: 999px;
  color: #4f5a53;
  font-size: 11px;
  font-weight: 750;
  line-height: 1;
  padding: 5px 8px;
  text-transform: capitalize;
  white-space: nowrap;
}

.status-badge--success {
  border-color: #b9dfc7;
  background: #edf8f0;
  color: #17623a;
}

.status-badge--warning {
  border-color: #edd08a;
  background: #fff7dd;
  color: #805a12;
}

.status-badge--danger {
  border-color: #efb2ac;
  background: #fff1ef;
  color: #9b2b23;
}

@media (max-width: 640px) {
  .app-shell {
    padding: 10px;
  }

  .dashboard-header h1,
  .result-shell__header h1 {
    font-size: 21px;
  }

  .dashboard-card {
    min-height: 0;
  }

  .dashboard-meta {
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  }

  .data-table {
    min-width: 680px;
  }

  .table-pagination {
    align-items: stretch;
    flex-direction: column;
  }

  .table-pagination__size,
  .table-pagination__controls {
    justify-content: space-between;
    width: 100%;
  }
}

    </style>
